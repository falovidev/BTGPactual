AWSTemplateFormatVersion: '2010-09-09'
Description: >
  BTG Pactual - Fondos de Inversión API
  Infraestructura para el backend desplegado en AWS (ECS Fargate + DynamoDB + SNS)

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues: [production, staging]
  DockerImageUri:
    Type: String
    Description: URI de la imagen Docker en ECR (ej. 123456789.dkr.ecr.us-east-1.amazonaws.com/fondos-api:latest)
  JwtSecret:
    Type: String
    NoEcho: true
    Description: Clave secreta para firmar tokens JWT (Base64)
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC donde se desplegará el servicio
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Subnets públicas para el ALB y el servicio ECS

Resources:

  # ========================================
  # DynamoDB Tables
  # ========================================
  ClientsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Clients
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: clientId
          AttributeType: S
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: clientId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: email-index
          KeySchema:
            - AttributeName: email
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: fondos-api

  FundsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Funds
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: fundId
          AttributeType: S
      KeySchema:
        - AttributeName: fundId
          KeyType: HASH
      Tags:
        - Key: Project
          Value: fondos-api

  TransactionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Transactions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: transactionId
          AttributeType: S
        - AttributeName: clientId
          AttributeType: S
      KeySchema:
        - AttributeName: transactionId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: clientId-index
          KeySchema:
            - AttributeName: clientId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: fondos-api

  SubscriptionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Subscriptions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: clientId
          AttributeType: S
        - AttributeName: fundId
          AttributeType: S
      KeySchema:
        - AttributeName: clientId
          KeyType: HASH
        - AttributeName: fundId
          KeyType: RANGE
      Tags:
        - Key: Project
          Value: fondos-api

  # ========================================
  # SNS Topic para notificaciones
  # ========================================
  NotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: fondos-notifications
      Tags:
        - Key: Project
          Value: fondos-api

  # ========================================
  # IAM Role para ECS Task
  # ========================================
  EcsTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: fondos-api-task-execution-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  EcsTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: fondos-api-task-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: fondos-api-dynamodb-sns
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:DescribeTable
                  - dynamodb:CreateTable
                Resource:
                  - !GetAtt ClientsTable.Arn
                  - !Sub '${ClientsTable.Arn}/index/*'
                  - !GetAtt FundsTable.Arn
                  - !GetAtt TransactionsTable.Arn
                  - !Sub '${TransactionsTable.Arn}/index/*'
                  - !GetAtt SubscriptionsTable.Arn
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource:
                  - !Ref NotificationTopic

  # ========================================
  # CloudWatch Log Group
  # ========================================
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/fondos-api
      RetentionInDays: 30

  # ========================================
  # ECS Cluster
  # ========================================
  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: fondos-api-cluster
      ClusterSettings:
        - Name: containerInsights
          Value: enabled

  # ========================================
  # Security Groups
  # ========================================
  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group para ALB de fondos-api
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0

  EcsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group para ECS tasks de fondos-api
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          SourceSecurityGroupId: !Ref AlbSecurityGroup

  # ========================================
  # Application Load Balancer
  # ========================================
  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: fondos-api-alb
      Scheme: internet-facing
      Type: application
      SecurityGroups:
        - !Ref AlbSecurityGroup
      Subnets: !Ref SubnetIds

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: fondos-api-tg
      Port: 8080
      Protocol: HTTP
      TargetType: ip
      VpcId: !Ref VpcId
      HealthCheckPath: /actuator/health
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  AlbListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  # ========================================
  # ECS Task Definition
  # ========================================
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: fondos-api
      Cpu: '512'
      Memory: '1024'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt EcsTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt EcsTaskRole.Arn
      ContainerDefinitions:
        - Name: fondos-api
          Image: !Ref DockerImageUri
          Essential: true
          PortMappings:
            - ContainerPort: 8080
              Protocol: tcp
          Environment:
            - Name: SPRING_PROFILES_ACTIVE
              Value: aws
            - Name: SNS_TOPIC_ARN
              Value: !Ref NotificationTopic
            - Name: APP_JWT_SECRET
              Value: !Ref JwtSecret
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs

  # ========================================
  # ECS Service
  # ========================================
  EcsService:
    Type: AWS::ECS::Service
    DependsOn: AlbListener
    Properties:
      ServiceName: fondos-api-service
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: 2
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups:
            - !Ref EcsSecurityGroup
          Subnets: !Ref SubnetIds
      LoadBalancers:
        - ContainerName: fondos-api
          ContainerPort: 8080
          TargetGroupArn: !Ref TargetGroup

Outputs:
  ApiEndpoint:
    Description: URL del Application Load Balancer
    Value: !Sub 'http://${ApplicationLoadBalancer.DNSName}'
  NotificationTopicArn:
    Description: ARN del topic SNS para notificaciones
    Value: !Ref NotificationTopic
  ClientsTableArn:
    Description: ARN de la tabla Clients
    Value: !GetAtt ClientsTable.Arn
  FundsTableArn:
    Description: ARN de la tabla Funds
    Value: !GetAtt FundsTable.Arn
  TransactionsTableArn:
    Description: ARN de la tabla Transactions
    Value: !GetAtt TransactionsTable.Arn
  SubscriptionsTableArn:
    Description: ARN de la tabla Subscriptions
    Value: !GetAtt SubscriptionsTable.Arn
