AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  BTG Pactual Fondos API - Serverless (Lambda + API Gateway + DynamoDB + SNS).
  100% free tier eligible.

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: java21
    Architectures:
      - x86_64

Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues: [dev, staging, prod]
  JwtSecret:
    Type: String
    NoEcho: true
    Description: Secreto Base64 para firmar tokens JWT

Resources:
  # ==================== DynamoDB ====================
  ClientsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub Clients-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: clientId
          AttributeType: S
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: clientId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: email-index
          KeySchema:
            - AttributeName: email
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  FundsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub Funds-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: fundId
          AttributeType: S
      KeySchema:
        - AttributeName: fundId
          KeyType: HASH

  TransactionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub Transactions-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: transactionId
          AttributeType: S
        - AttributeName: clientId
          AttributeType: S
      KeySchema:
        - AttributeName: transactionId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: clientId-index
          KeySchema:
            - AttributeName: clientId
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  SubscriptionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub Subscriptions-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: clientId
          AttributeType: S
        - AttributeName: fundId
          AttributeType: S
      KeySchema:
        - AttributeName: clientId
          KeyType: HASH
        - AttributeName: fundId
          KeyType: RANGE

  # ==================== SNS ====================
  NotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub fondos-notifications-${Environment}

  # ==================== Lambda ====================
  FondosApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub fondos-api-${Environment}
      Handler: com.btg.fondos.infrastructure.adapter.in.lambda.StreamLambdaHandler::handleRequest
      CodeUri: ../build/distributions/fondos-api-1.0.0.zip
      SnapStart:
        ApplyOn: PublishedVersions
      AutoPublishAlias: live
      Environment:
        Variables:
          SPRING_PROFILES_ACTIVE: aws
          AWS_DYNAMODB_REGION: !Ref AWS::Region
          SNS_TOPIC_ARN: !Ref NotificationTopic
          APP_JWT_SECRET: !Ref JwtSecret
          APP_JWT_EXPIRATION_MS: '86400000'
          APP_CLIENT_INITIAL_BALANCE: '500000'
          DYNAMODB_TABLE_CLIENTS: !Ref ClientsTable
          DYNAMODB_TABLE_FUNDS: !Ref FundsTable
          DYNAMODB_TABLE_TRANSACTIONS: !Ref TransactionsTable
          DYNAMODB_TABLE_SUBSCRIPTIONS: !Ref SubscriptionsTable
          API_BASE_PATH: !Ref Environment
          JAVA_TOOL_OPTIONS: '-XX:+TieredCompilation -XX:TieredStopAtLevel=1'
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ClientsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref FundsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref TransactionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SubscriptionsTable
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt NotificationTopic.TopicName
      Events:
        ApiProxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref FondosHttpApi
            Path: /{proxy+}
            Method: ANY
        ApiRoot:
          Type: HttpApi
          Properties:
            ApiId: !Ref FondosHttpApi
            Path: /
            Method: ANY

  # ==================== API Gateway HTTP ====================
  FondosHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Environment
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        AllowHeaders:
          - '*'

Outputs:
  ApiUrl:
    Description: URL base de la API
    Value: !Sub 'https://${FondosHttpApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}'

  FondosApiFunctionArn:
    Description: ARN de la función Lambda
    Value: !GetAtt FondosApiFunction.Arn

  NotificationTopicArn:
    Description: ARN del topic SNS
    Value: !Ref NotificationTopic
